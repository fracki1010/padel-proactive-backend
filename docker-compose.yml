services:
  padel-proactive-api:
    container_name: padel-proactive-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apiServer.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${BIND_IP:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:3000/',(res)=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  padel-proactive-wa-worker:
    container_name: padel-proactive-wa-worker
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "waWorker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - whatsapp_sessions:/usr/src/app/.wwebjs_auth
      - whatsapp_cache:/usr/src/app/.wwebjs_cache
    depends_on:
      - padel-proactive-api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp_sessions:
  whatsapp_cache:
