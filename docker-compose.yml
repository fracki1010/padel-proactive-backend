services:
  padel-proactive-backend:
    container_name: padel-proactive-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${BIND_IP:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    volumes:
      - ./.wwebjs_auth:/usr/src/app/.wwebjs_auth
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:3000/',(res)=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
