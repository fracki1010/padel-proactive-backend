services:
  padel-proactive-api:
    container_name: padel-proactive-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apiServer.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
      WHATSAPP_QUEUE_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_TLS: "false"
    ports:
      - "${BIND_IP:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:3000/',(res)=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: padel-proactive-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
